<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.22);
      --text: #f4f6ff;
      --text-muted: rgba(244, 246, 255, 0.65);
      --accent: #7c3aed;
      --accent-glow: #22d3ee;
      --error: #fb7185;
      --success: #34d399;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
    }

    /* Animated vibrant gradient background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(
        125deg,
        #1e0a3c 0%,
        #312e81 25%,
        #0f172a 50%,
        #1e3a5f 75%,
        #4c1d95 100%
      );
      background-size: 400% 400%;
      animation: gradientShift 14s ease infinite;
    }

    .bg::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.55) 0%, transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.4) 0%, transparent 42%),
        radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.25) 0%, transparent 50%);
      animation: blobFloat 18s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(3%, -4%) scale(1.05); }
      66% { transform: translate(-4%, 2%) scale(0.98); }
    }

    .card {
      width: 100%;
      max-width: 400px;
      padding: 2.25rem 2rem;
      border-radius: 1.25rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .card h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .card p.sub {
      margin: 0 0 1.75rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 0.65rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder {
      color: rgba(244, 246, 255, 0.35);
    }

    input:focus {
      border-color: rgba(124, 58, 237, 0.6);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
      background: rgba(0, 0, 0, 0.28);
    }

    .btn-wrap {
      margin-top: 1.5rem;
    }

    button {
      width: 100%;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 0.65rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      color: #0f172a;
      background: linear-gradient(135deg, #c4b5fd 0%, #22d3ee 100%);
      box-shadow: 0 4px 20px rgba(34, 211, 238, 0.25);
      transition:
        transform 0.2s,
        box-shadow 0.25s,
        filter 0.25s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow:
        0 0 24px rgba(34, 211, 238, 0.65),
        0 0 48px rgba(124, 58, 237, 0.35),
        0 6px 24px rgba(0, 0, 0, 0.25);
      filter: brightness(1.08);
    }

    button:active {
      transform: translateY(0);
    }

    .message {
      margin-top: 1.1rem;
      min-height: 1.35rem;
      font-size: 0.875rem;
      line-height: 1.4;
      border-radius: 0.5rem;
      padding: 0.6rem 0.75rem;
    }

    .message:empty {
      display: none;
    }

    .message.error {
      display: block;
      background: rgba(251, 113, 133, 0.12);
      border: 1px solid rgba(251, 113, 133, 0.35);
      color: #fecdd3;
    }

    .message.success {
      display: block;
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.35);
      color: #a7f3d0;
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="card" aria-labelledby="login-title">
    <h1 id="login-title">Welcome</h1>
    <p class="sub">Sign in to your account</p>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          placeholder="Your username"
        />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>
      <div class="btn-wrap">
        <button type="submit">Login</button>
      </div>
    </form>

    <div id="message" class="message" role="status" aria-live="polite"></div>
  </main>

  <script>
    (function () {
      var VALID_USER = "Oguzhan";
      var VALID_PASS = "oguzhan1234";
      /** TC_04: Exact payload to block (SQL injection simulation). */
      var SQL_INJECTION_USERNAME = "' OR '1'='1";

      var form = document.getElementById("login-form");
      var usernameInput = document.getElementById("username");
      var passwordInput = document.getElementById("password");
      var messageEl = document.getElementById("message");

      function setMessage(text, type) {
        messageEl.textContent = text || "";
        messageEl.className = "message" + (type ? " " + type : "");
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var username = usernameInput.value.trim();
        var password = passwordInput.value;

        /*
         * TC_03 — Empty fields: if username or password is empty,
         * exact message: "Fields cannot be empty"
         */
        if (username === "" || password === "") {
          setMessage("Fields cannot be empty", "error");
          return;
        }

        /*
         * TC_04 — SQL injection: if username is exactly `' OR '1'='1`,
         * block login and show an error indicating SQL injection was prevented.
         */
        if (username === SQL_INJECTION_USERNAME) {
          setMessage("SQL injection attempt blocked.", "error");
          return;
        }

        var len = password.length;

        /*
         * TC_BV_01 — Boundary: password length 7 or less → reject
         * (Length is checked before credential verification.)
         */
        if (len <= 7) {
          setMessage("Password must be between 8 and 12 characters.", "error");
          return;
        }

        /*
         * TC_BV_04 — Boundary: password length 13 or more → reject
         */
        if (len >= 13) {
          setMessage("Password must be between 8 and 12 characters.", "error");
          return;
        }

        /*
         * TC_BV_02 — Boundary: length exactly 8 → accepted (within range)
         * TC_BV_03 — Boundary: length exactly 12 → accepted (within range)
         * Lengths 9–11 are also accepted as within range.
         */

        /*
         * TC_02 — Invalid login: if credentials are not Oguzhan / oguzhan1234,
         * exact message: "Invalid credentials"
         */
        if (username !== VALID_USER || password !== VALID_PASS) {
          setMessage("Invalid credentials", "error");
          return;
        }

        /*
         * TC_01 — Valid login: Oguzhan / oguzhan1234
         * Simulated dashboard redirect — success message
         */
        setMessage("Login successful. Redirecting to dashboard…", "success");
      });
    })();
  </script>
</body>
</html>
